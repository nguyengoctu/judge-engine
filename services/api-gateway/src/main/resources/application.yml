server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: problem-service
          uri: http://${PROBLEM_SERVICE_HOST:localhost}:${PROBLEM_SERVICE_PORT:8081}
          predicates:
            - Path=/api/problems/**
        - id: submission-service
          uri: http://${SUBMISSION_SERVICE_HOST:localhost}:${SUBMISSION_SERVICE_PORT:8082}
          predicates:
            - Path=/api/submissions/**,/api/competitions/**,/api/queue/**

management:
  endpoints:
    web:
      exposure:
        include: health, info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    urls:
      - name: API Gateway
        url: /v3/api-docs
