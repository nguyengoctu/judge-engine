# SonarCloud Configuration
sonar.organization=ngoctu
sonar.projectKey=judge-engine
sonar.projectName=judge-engine
sonar.projectVersion=1.0

# Source directories
sonar.sources=services/

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/__pycache__/**,\
  **/target/**,\
  **/venv/**

# Java
sonar.java.binaries=services/*/target/classes
sonar.coverage.jacoco.xmlReportPaths=services/*/target/site/jacoco/jacoco.xml

# Python
sonar.python.coverage.reportPaths=services/*/coverage.xml
