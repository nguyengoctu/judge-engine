services:
  # ───────────────── Databases ─────────────────
  problem-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PROBLEM_DB_NAME:-problemdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports: []
    networks:
      - backend-net
    volumes:
      - problem-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  submission-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SUBMISSION_DB_NAME:-submissiondb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports: []
    networks:
      - backend-net
    volumes:
      - submission-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────── Infrastructure ─────────────────
  redis:
    image: redis:7-alpine
    ports: []
    networks:
      - backend-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: []
    networks:
      - backend-net
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ───────────────── Application Services ─────────────────
  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    ports: []
    networks:
      - backend-net
      - frontend-net
    environment:
      PROBLEM_SERVICE_HOST: ${PROBLEM_SERVICE_HOST:-problem-service}
      PROBLEM_SERVICE_PORT: ${PROBLEM_SERVICE_PORT:-8081}
      SUBMISSION_SERVICE_HOST: ${SUBMISSION_SERVICE_HOST:-submission-service}
      SUBMISSION_SERVICE_PORT: ${SUBMISSION_SERVICE_PORT:-8082}
    depends_on:
      problem-service:
        condition: service_healthy
      submission-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  problem-service:
    build:
      context: ../services/problem-service
      dockerfile: Dockerfile
    ports: []
    networks:
      - backend-net
    environment:
      DB_HOST: ${PROBLEM_DB_HOST:-problem-db}
      DB_PORT: ${PROBLEM_DB_PORT:-5432}
      DB_NAME: ${PROBLEM_DB_NAME:-problemdb}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      problem-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  submission-service:
    build:
      context: ../services/submission-service
      dockerfile: Dockerfile
    ports: []
    networks:
      - backend-net
    environment:
      DB_HOST: ${SUBMISSION_DB_HOST:-submission-db}
      DB_PORT: ${SUBMISSION_DB_PORT:-5432}
      DB_NAME: ${SUBMISSION_DB_NAME:-submissiondb}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
    depends_on:
      submission-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ../services/worker
      dockerfile: Dockerfile
    ports: []
    networks:
      - backend-net
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      DB_HOST: ${SUBMISSION_DB_HOST:-submission-db}
      DB_PORT: ${SUBMISSION_DB_PORT:-5432}
      DB_NAME: ${SUBMISSION_DB_NAME:-submissiondb}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      EXECUTOR_MODE: ${EXECUTOR_MODE:-docker}
      SANDBOX_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-256m}
      SANDBOX_CPU_LIMIT: ${SANDBOX_CPU_LIMIT:-0.5}
      SANDBOX_TIMEOUT: ${SANDBOX_TIMEOUT:-10}
      SANDBOX_PIDS_LIMIT: ${SANDBOX_PIDS_LIMIT:-50}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      rabbitmq:
        condition: service_healthy
      submission-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile
    ports: []
    networks:
      - frontend-net
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports: []
    networks:
      - frontend-net
    depends_on:
      api-gateway:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ───────────────── Runner Images (build-only) ─────────────────
  judge-runner-python:
    image: judge-runner-python:latest
    build:
      context: ./runners
      dockerfile: Dockerfile.python
    profiles: ["build"]

  judge-runner-javascript:
    image: judge-runner-javascript:latest
    build:
      context: ./runners
      dockerfile: Dockerfile.javascript
    profiles: ["build"]

  judge-runner-java:
    image: judge-runner-java:latest
    build:
      context: ./runners
      dockerfile: Dockerfile.java
    profiles: ["build"]

volumes:
  problem-db-data:
  submission-db-data:
  redis-data:
  rabbitmq-data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
