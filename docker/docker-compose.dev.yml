services:
  # ───────────────── Databases ─────────────────
  problem-db:
    ports:
      - "${PROBLEM_DB_PORT:-5432}:${PROBLEM_DB_PORT:-5432}"
  submission-db:
    ports:
      - "${SUBMISSION_DB_PORT:-5433}:${SUBMISSION_DB_PORT:-5432}"

  # ───────────────── Infrastructure ─────────────────
  redis:
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"

  rabbitmq:
    ports:
      - "${RABBITMQ_PORT:-5672}:${RABBITMQ_PORT:-5672}"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:${RABBITMQ_MANAGEMENT_PORT:-15672}"

  # ───────────────── Application Services ─────────────────
  api-gateway:
    ports:
      - "${API_GATEWAY_PORT:-8080}:${API_GATEWAY_PORT:-8080}"

  problem-service:
    ports:
      - "${PROBLEM_SERVICE_PORT:-8081}:${PROBLEM_SERVICE_PORT:-8081}"

  submission-service:
    ports:
      - "${SUBMISSION_SERVICE_PORT:-8082}:${SUBMISSION_SERVICE_PORT:-8082}"

  worker:
    ports:
      - "${WORKER_PORT:-8083}:${WORKER_PORT:-8083}"

  frontend:
    ports:
      - "${FRONTEND_PORT:-4200}:${FRONTEND_PORT:-4200}"

  nginx:
    ports:
      - "${NGINX_PORT:-80}:${NGINX_PORT:-80}"
