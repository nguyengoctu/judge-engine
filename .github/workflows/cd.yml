name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Build & push service images to GHCR ──────────────────────────────────
  push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: worker
            context: services/worker
          - service: submission-service
            context: services/submission-service
          - service: problem-service
            context: services/problem-service
          - service: api-gateway
            context: services/api-gateway
          - service: frontend
            context: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── Build & push runner (sandbox) images to GHCR ─────────────────────────
  push-runners:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - lang: python
            dockerfile: docker/runners/Dockerfile.python
          - lang: javascript
            dockerfile: docker/runners/Dockerfile.javascript
          - lang: java
            dockerfile: docker/runners/Dockerfile.java
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Build and push runner-${{ matrix.lang }}
        uses: docker/build-push-action@v5
        with:
          context: docker/runners
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/judge-runner-${{ matrix.lang }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/judge-runner-${{ matrix.lang }}:latest
          cache-from: type=gha,scope=runner-${{ matrix.lang }}
          cache-to: type=gha,scope=runner-${{ matrix.lang }},mode=max

  # ── GitOps: update values-eks.yaml version → triggers ArgoCD auto-sync ───
  gitops-update:
    runs-on: ubuntu-latest
    needs: [push-images, push-runners]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT if repo has branch protection rules on master;
          # otherwise GITHUB_TOKEN is sufficient for pushing to master.
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update version in values-eks.yaml and Chart.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.VERSION }}/" \
            k8s/helm/judge-engine/values-eks.yaml
          sed -i "s/^appVersion: .*/appVersion: ${{ steps.version.outputs.VERSION }}/" \
            k8s/helm/judge-engine/Chart.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/helm/judge-engine/values-eks.yaml k8s/helm/judge-engine/Chart.yaml
          git commit -m "chore: bump image version to ${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin HEAD:master
