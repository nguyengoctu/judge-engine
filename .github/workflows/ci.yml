on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  filter-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      problem-service: ${{ steps.filter.outputs.problem-service }}
      submission-service: ${{ steps.filter.outputs.submission-service }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Filter changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - "services/frontend/**"
            api-gateway:
              - "services/api-gateway/**"
            problem-service:
              - "services/problem-service/**"
            submission-service:
              - "services/submission-service/**"
            worker:
              - "services/worker/**"
              - "docker/runners/**"
              
  test-worker:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.worker == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd services/worker
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: lint worker
        run: |
          cd services/worker
          flake8 app/
      - name: Test worker
        run: |
          cd services/worker
          pytest --cov=app --cov-report=xml:coverage.xml tests/
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: worker-reports
          path: services/worker/pytest-results.xml
      - name: Upload coverage for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: worker-coverage
          path: services/worker/coverage.xml
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: services/worker
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
      - name: Build runner images
        run: |
          docker build -t test-runner-python -f docker/runners/Dockerfile.python docker/runners/
          docker build -t test-runner-java -f docker/runners/Dockerfile.java docker/runners/
          docker build -t test-runner-js -f docker/runners/Dockerfile.javascript docker/runners/

  test-submission-service:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.submission-service == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd services/submission-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: lint submission service
        run: |
          cd services/submission-service
          flake8 app/
      - name: Test submission service
        run: |
          cd services/submission-service
          pytest --cov=app --cov-report=xml:coverage.xml tests/
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: submission-service-reports
          path: services/submission-service/pytest-results.xml
      - name: Upload coverage for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: submission-service-coverage
          path: services/submission-service/coverage.xml
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build submission-service image
        uses: docker/build-push-action@v5
        with:
          context: services/submission-service
          push: false
          cache-from: type=gha,scope=submission-service
          cache-to: type=gha,scope=submission-service,mode=max

  test-problem-service:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.problem-service == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up mvn
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install dependencies
        run: |
          cd services/problem-service
          mvn verify
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: problem-service-reports
          path: services/problem-service/target/surefire-reports
      - name: Upload build for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: problem-service-build
          path: |
            services/problem-service/target/classes
            services/problem-service/target/site/jacoco
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build problem-service image
        uses: docker/build-push-action@v5
        with:
          context: services/problem-service
          push: false
          cache-from: type=gha,scope=problem-service
          cache-to: type=gha,scope=problem-service,mode=max
  
  test-api-gateway:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.api-gateway == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up mvn
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install dependencies
        run: |
          cd services/api-gateway
          mvn verify
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-reports
          path: services/api-gateway/target/surefire-reports
      - name: Upload build for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-build
          path: |
            services/api-gateway/target/classes
            services/api-gateway/target/site/jacoco
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build api-gateway image
        uses: docker/build-push-action@v5
        with:
          context: services/api-gateway
          push: false
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,scope=api-gateway,mode=max
    
  test-frontend:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd services/frontend
          npm ci
      - name: Test frontend
        run: |
          cd services/frontend
          npx ng test --no-watch --browsers=ChromeHeadless
      - name: Build frontend
        run: |
          cd services/frontend
          npm run build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: services/frontend
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  sonarcloud:
    needs: [test-api-gateway, test-problem-service, test-submission-service, test-worker, test-frontend]
    if: always() && !failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-{build,coverage}'
          merge-multiple: false
      - name: Restore artifacts to source tree
        run: |
          # Java builds
          cp -r problem-service-build/services/problem-service/target services/problem-service/ 2>/dev/null || true
          cp -r api-gateway-build/services/api-gateway/target services/api-gateway/ 2>/dev/null || true
          # Python coverage
          cp worker-coverage/coverage.xml services/worker/ 2>/dev/null || true
          cp submission-service-coverage/coverage.xml services/submission-service/ 2>/dev/null || true
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}