name: CI

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
    paths:
      - "services/**"
      - "docker/runners/**"
  workflow_dispatch:

jobs:
  filter-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      problem-service: ${{ steps.filter.outputs.problem-service }}
      submission-service: ${{ steps.filter.outputs.submission-service }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Filter changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - "services/frontend/**"
            api-gateway:
              - "services/api-gateway/**"
            problem-service:
              - "services/problem-service/**"
            submission-service:
              - "services/submission-service/**"
            worker:
              - "services/worker/**"
              - "docker/runners/**"
              
  test-worker:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.worker == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd services/worker
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: lint worker
        run: |
          cd services/worker
          flake8 app/
      - name: Test worker
        run: |
          cd services/worker
          pytest --cov=app --cov-report=xml:coverage.xml tests/
      - name: Upload coverage for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: worker-coverage
          path: services/worker/coverage.xml
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build worker image
        id: build-worker
        uses: docker/build-push-action@v5
        with:
          context: services/worker
          load: true
          push: false
          tags: worker:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
      - name: Build runner images
        run: |
          docker build -t runner-python:${{ github.sha }} -f docker/runners/Dockerfile.python docker/runners/
          docker build -t runner-java:${{ github.sha }} -f docker/runners/Dockerfile.java docker/runners/
          docker build -t runner-js:${{ github.sha }} -f docker/runners/Dockerfile.javascript docker/runners/
      # ── Trivy Container Scanning ──
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db
          restore-keys: trivy-db
      - name: Trivy scan — worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Trivy scan — runner-python
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: runner-python:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Trivy scan — runner-java
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: runner-java:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Trivy scan — runner-js
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: runner-js:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Trivy SARIF report — worker
        uses: aquasecurity/trivy-action@master
        if: always() && steps.build-worker.outcome == 'success'
        with:
          image-ref: worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
      - name: Upload Trivy report — worker
        uses: actions/upload-artifact@v4
        if: always() && steps.build-worker.outcome == 'success'
        with:
          name: trivy-worker
          path: trivy-worker.sarif
          retention-days: 7

  test-submission-service:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.submission-service == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd services/submission-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: lint submission service
        run: |
          cd services/submission-service
          flake8 app/
      - name: Test submission service
        run: |
          cd services/submission-service
          pytest --cov=app --cov-report=xml:coverage.xml tests/
      - name: Upload coverage for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: submission-service-coverage
          path: services/submission-service/coverage.xml
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build submission-service image
        id: build-submission
        uses: docker/build-push-action@v5
        with:
          context: services/submission-service
          load: true
          push: false
          tags: submission-service:${{ github.sha }}
          cache-from: type=gha,scope=submission-service
          cache-to: type=gha,scope=submission-service,mode=max
      # ── Trivy Container Scanning ──
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db
          restore-keys: trivy-db
      - name: Trivy scan — submission-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: submission-service:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Trivy SARIF report — submission-service
        uses: aquasecurity/trivy-action@master
        if: always() && steps.build-submission.outcome == 'success'
        with:
          image-ref: submission-service:${{ github.sha }}
          format: sarif
          output: trivy-submission-service.sarif
      - name: Upload Trivy report — submission-service
        uses: actions/upload-artifact@v4
        if: always() && steps.build-submission.outcome == 'success'
        with:
          name: trivy-submission-service
          path: trivy-submission-service.sarif
          retention-days: 7

  test-problem-service:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.problem-service == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up mvn
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install dependencies
        run: |
          cd services/problem-service
          mvn verify
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: problem-service-reports
          path: services/problem-service/target/surefire-reports
      - name: Upload build for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: problem-service-build
          path: |
            services/problem-service/target/classes
            services/problem-service/target/site/jacoco
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build problem-service image
        id: build-problem
        uses: docker/build-push-action@v5
        with:
          context: services/problem-service
          load: true
          push: false
          tags: problem-service:${{ github.sha }}
          cache-from: type=gha,scope=problem-service
          cache-to: type=gha,scope=problem-service,mode=max
      # ── Trivy Container Scanning ──
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db
          restore-keys: trivy-db
      - name: Trivy scan — problem-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: problem-service:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Trivy SARIF report — problem-service
        uses: aquasecurity/trivy-action@master
        if: always() && steps.build-problem.outcome == 'success'
        with:
          image-ref: problem-service:${{ github.sha }}
          format: sarif
          output: trivy-problem-service.sarif
      - name: Upload Trivy report — problem-service
        uses: actions/upload-artifact@v4
        if: always() && steps.build-problem.outcome == 'success'
        with:
          name: trivy-problem-service
          path: trivy-problem-service.sarif
          retention-days: 7
  
  test-api-gateway:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.api-gateway == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up mvn
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Install dependencies
        run: |
          cd services/api-gateway
          mvn verify
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-reports
          path: services/api-gateway/target/surefire-reports
      - name: Upload build for SonarCloud
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-build
          path: |
            services/api-gateway/target/classes
            services/api-gateway/target/site/jacoco
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build api-gateway image
        id: build-api-gateway
        uses: docker/build-push-action@v5
        with:
          context: services/api-gateway
          load: true
          push: false
          tags: api-gateway:${{ github.sha }}
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,scope=api-gateway,mode=max
      # ── Trivy Container Scanning ──
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db
          restore-keys: trivy-db
      - name: Trivy scan — api-gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api-gateway:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Trivy SARIF report — api-gateway
        uses: aquasecurity/trivy-action@master
        if: always() && steps.build-api-gateway.outcome == 'success'
        with:
          image-ref: api-gateway:${{ github.sha }}
          format: sarif
          output: trivy-api-gateway.sarif
      - name: Upload Trivy report — api-gateway
        uses: actions/upload-artifact@v4
        if: always() && steps.build-api-gateway.outcome == 'success'
        with:
          name: trivy-api-gateway
          path: trivy-api-gateway.sarif
          retention-days: 7
    
  test-frontend:
    needs: filter-changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || needs.filter-changes.outputs.frontend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd services/frontend
          npm ci
      - name: Test frontend
        run: |
          cd services/frontend
          npx ng test --no-watch --browsers=ChromeHeadless
      - name: Build frontend
        run: |
          cd services/frontend
          npm run build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: services/frontend
          load: true
          push: false
          tags: frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
      # ── Trivy Container Scanning ──
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db
          restore-keys: trivy-db
      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
      - name: Trivy SARIF report — frontend
        uses: aquasecurity/trivy-action@master
        if: always() && steps.build-frontend.outcome == 'success'
        with:
          image-ref: frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
      - name: Upload Trivy report — frontend
        uses: actions/upload-artifact@v4
        if: always() && steps.build-frontend.outcome == 'success'
        with:
          name: trivy-frontend
          path: trivy-frontend.sarif
          retention-days: 7

  sonarcloud:
    needs: [test-api-gateway, test-problem-service, test-submission-service, test-worker, test-frontend]
    if: always() && !failure() && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-build'
        continue-on-error: true
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-coverage'
        continue-on-error: true
      - name: Restore artifacts to source tree
        run: |
          # Java builds
          cp -r problem-service-build/services/problem-service/target services/problem-service/ 2>/dev/null || true
          cp -r api-gateway-build/services/api-gateway/target services/api-gateway/ 2>/dev/null || true
          # Python coverage
          cp worker-coverage/coverage.xml services/worker/ 2>/dev/null || true
          cp submission-service-coverage/coverage.xml services/submission-service/ 2>/dev/null || true
          # Fallback: create empty dirs so sonar.java.binaries doesn't fail
          mkdir -p services/problem-service/target/classes
          mkdir -p services/api-gateway/target/classes
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          