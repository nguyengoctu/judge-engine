version: 2
updates:
  # Python (pip)
  - package-ecosystem: "pip"
    directory: "/services/worker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 1

  - package-ecosystem: "pip"
    directory: "/services/submission-service"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 1

  # Java (Maven)
  - package-ecosystem: "maven"
    directory: "/services/problem-service"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "java"
    open-pull-requests-limit: 1

  - package-ecosystem: "maven"
    directory: "/services/api-gateway"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "java"
    open-pull-requests-limit: 1

  # Node (npm)
  - package-ecosystem: "npm"
    directory: "/services/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 1

  # Docker
  - package-ecosystem: "docker"
    directory: "/services/worker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 1
  
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 1
