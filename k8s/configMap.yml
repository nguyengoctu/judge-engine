apiVersion: v1
kind: ConfigMap
metadata:
  name: judge-engine-config
  namespace: judge-engine
data:
  # DB
  DB_HOST: judge-db
  DB_PORT: "5432"
  DB_NAME: judgedb

  POSTGRES_DB: judgedb
  
  # Redis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  
  # RabbitMQ
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: "5672"
  
  # Problem Service
  PROBLEM_SERVICE_HOST: problem-service
  PROBLEM_SERVICE_PORT: "8081"
  
  # Submission Service
  SUBMISSION_SERVICE_HOST: submission-service
  SUBMISSION_SERVICE_PORT: "8082"
  
  # Executor
  EXECUTOR_MODE: docker
  SANDBOX_MEMORY_LIMIT: "256m"
  SANDBOX_CPU_LIMIT: "0.5"
  SANDBOX_TIMEOUT: "10"
  SANDBOX_PIDS_LIMIT: "50"
  MOCK_EXEC_TIMEOUT: "5"
  MOCK_EXEC_MAX_MEMORY: "256"
  
  # Logging
  LOG_LEVEL: DEBUG
  LOG_FORMAT: json
  
  # NGINX
  NGINX_PORT: "80"
  
  # Spring Profiles
  SPRING_PROFILES_ACTIVE: dev