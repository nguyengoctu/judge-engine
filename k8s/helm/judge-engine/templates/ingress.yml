apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "judge-engine.fullname" . }}-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "judge-engine.labels" . | nindent 4 }}
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "judge-engine.fullname" . }}-api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "judge-engine.fullname" . }}-frontend
                port:
                  number: 80
