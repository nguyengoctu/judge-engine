{{- if .Values.externalSecrets.enabled }}
# ExternalSecret — EKS only.
# ESO watches this CR and creates/refreshes the K8s Secret automatically
# by pulling all keys from the Secrets Manager secret (POSTGRES_USER,
# POSTGRES_PASSWORD, RABBITMQ_USER, RABBITMQ_PASS).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "judge-engine.fullname" . }}-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "judge-engine.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ include "judge-engine.fullname" . }}-secret
    creationPolicy: Owner
  # dataFrom.extract pulls every key in the JSON blob as a separate Secret key.
  # The Secrets Manager secret contains: POSTGRES_USER, POSTGRES_PASSWORD,
  # RABBITMQ_USER, RABBITMQ_PASS — exactly what services expect.
  dataFrom:
    - extract:
        key: {{ .Values.externalSecrets.secretName }}
{{- end }}
