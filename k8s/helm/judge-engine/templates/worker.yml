apiVersion: apps/v1
kind: Deployment
metadata: 
  name: {{ include "judge-engine.fullname" . }}-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "judge-engine.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: worker
  replicas: {{ .Values.worker.replicaCount }}
  template:
    metadata:
      labels:
        {{- include "judge-engine.labels" . | nindent 8 }}
        app: worker
    spec:
      # Init: wait for DinD + build runner images
      initContainers:
        - name: build-runners
          image: docker:cli
          restartPolicy: Always
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          command:
            - sh
            - -c
            - |
              echo "Waiting for Docker daemon..."
              until docker info >/dev/null 2>&1; do sleep 1; done
              echo "Docker daemon ready!"

              echo "Building runner images..."
              # Python runner
              cat <<'DOCKERFILE' | docker build -t judge-runner-python:latest -
              FROM python:3.11-alpine
              RUN apk upgrade --no-cache && adduser -D runner
              USER runner
              WORKDIR /code
              DOCKERFILE

              # JavaScript runner
              cat <<'DOCKERFILE' | docker build -t judge-runner-javascript:latest -
              FROM node:20-alpine
              RUN apk upgrade --no-cache && adduser -D runner
              USER runner
              WORKDIR /code
              DOCKERFILE

              # Java runner
              cat <<'DOCKERFILE' | docker build -t judge-runner-java:latest -
              FROM eclipse-temurin:21-jdk-alpine
              RUN apk upgrade --no-cache && adduser -D runner
              USER runner
              WORKDIR /code
              DOCKERFILE

              echo "All runner images built!"
              docker images | grep judge-runner

              echo "Sidecar staying alive..."
              sleep infinity
      containers:
        # Worker app
        - name: worker
          image: {{ printf "%s:%s" .Values.worker.image .Values.version }}
          imagePullPolicy: {{ .Values.image.imagePullPolicy }}
          ports:
            - containerPort: 8083
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: {{ include "judge-engine.fullname" . }}-config
            - secretRef:
                name: {{ include "judge-engine.fullname" . }}-secret

        # Docker-in-Docker sidecar
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
      volumes:
        - name: dind-storage
          emptyDir: {}