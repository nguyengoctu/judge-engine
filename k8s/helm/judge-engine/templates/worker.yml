{{- $runnerRegistry := default (printf "%s-registry:5000" (include "judge-engine.fullname" .)) .Values.worker.runnerRegistry }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "judge-engine.fullname" . }}-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "judge-engine.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        {{- include "judge-engine.labels" . | nindent 8 }}
        app: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "judge-engine.fullname" . }}-sa
      {{- end }}
      # Init: wait for DinD + pull runner images
      initContainers:
        - name: pull-runners
          image: docker:cli
          restartPolicy: Always
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
            - name: REGISTRY
              value: {{ $runnerRegistry }}
          resources:
            requests:
              cpu: {{ .Values.worker.resources.containers.builder.requests.cpu }}
              memory: {{ .Values.worker.resources.containers.builder.requests.memory }}
            limits:
              cpu: {{ .Values.worker.resources.containers.builder.limits.cpu }}
              memory: {{ .Values.worker.resources.containers.builder.limits.memory }}
          {{- if .Values.worker.ghcrSecret }}
          volumeMounts:
            - name: docker-config
              mountPath: /root/.docker
              readOnly: true
          {{- end }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for Docker daemon..."
              until docker info >/dev/null 2>&1; do sleep 1; done
              echo "Docker daemon ready!"

              echo "Pulling runner images from $REGISTRY ..."
              for lang in python javascript java; do
                IMAGE="$REGISTRY/judge-runner-${lang}:latest"
                echo "Pulling $IMAGE ..."
                until docker pull "$IMAGE" 2>/dev/null; do
                  echo "  Waiting for $IMAGE ..."
                  sleep 5
                done
                echo "  $IMAGE ready"
              done

              echo "All runner images pulled!"
              docker images | grep judge-runner

              echo "Sidecar staying alive..."
              sleep infinity
      containers:
        # Worker app
        - name: worker
          image: {{ printf "%s:%s" .Values.worker.image .Values.version }}
          imagePullPolicy: {{ .Values.image.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.worker.resources.containers.worker.requests.cpu }}
              memory: {{ .Values.worker.resources.containers.worker.requests.memory }}
            limits:
              cpu: {{ .Values.worker.resources.containers.worker.limits.cpu }}
              memory: {{ .Values.worker.resources.containers.worker.limits.memory }}
          envFrom:
            - configMapRef:
                name: {{ include "judge-engine.fullname" . }}-config
            - secretRef:
                name: {{ include "judge-engine.fullname" . }}-secret
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "judge-engine.fullname" . }}-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "judge-engine.fullname" . }}-secret
                  key: POSTGRES_PASSWORD

        # Docker-in-Docker sidecar
        - name: dind
          image: docker:dind
          {{- if not .Values.worker.runnerRegistry }}
          args:
            - --insecure-registry={{ include "judge-engine.fullname" . }}-registry:5000
          {{- end }}
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
          resources:
            requests:
              cpu: {{ .Values.worker.resources.containers.dind.requests.cpu }}
              memory: {{ .Values.worker.resources.containers.dind.requests.memory }}
            limits:
              cpu: {{ .Values.worker.resources.containers.dind.limits.cpu }}
              memory: {{ .Values.worker.resources.containers.dind.limits.memory }}
      volumes:
        - name: dind-storage
          emptyDir: {}
        {{- if .Values.worker.ghcrSecret }}
        # Docker config with GHCR credentials for runner image pulls
        # Source secret format: kubernetes.io/dockerconfigjson
        - name: docker-config
          secret:
            secretName: {{ .Values.worker.ghcrSecret }}
            items:
              - key: .dockerconfigjson
                path: config.json
        {{- end }}

{{- if .Values.monitoring.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "judge-engine.fullname" . }}-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "judge-engine.labels" . | nindent 4 }}
    app: worker
spec:
  selector:
    matchLabels:
      app: worker
  podMetricsEndpoints:
    - port: http
      path: /metrics
{{- end }}
