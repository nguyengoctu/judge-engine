apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "judge-engine.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "judge-engine.labels" . | nindent 4 }}
data:
  DB_HOST: {{ default (printf "%s-db" (include "judge-engine.fullname" .)) .Values.judgeDb.host }}
  DB_PORT: "5432"
  DB_NAME: judgedb

  POSTGRES_DB: judgedb
  
  # Aliases for Java services (Spring Boot uses DB_USER / DB_PASSWORD)
  # These will be overridden by the Secret's POSTGRES_USER / POSTGRES_PASSWORD
  # when the Secret is loaded via envFrom. But if Secret keys differ,
  # we need explicit mapping. Handled below via env vars in pods.
  
  # Redis
  REDIS_HOST: {{ include "judge-engine.fullname" . }}-redis
  REDIS_PORT: "6379"
  
  # RabbitMQ
  RABBITMQ_HOST: {{ include "judge-engine.fullname" . }}-rabbitmq
  RABBITMQ_PORT: "5672"
  
  # Problem Service
  PROBLEM_SERVICE_HOST: {{ include "judge-engine.fullname" . }}-problem-service
  PROBLEM_SERVICE_PORT: "8081"
  
  # Submission Service
  SUBMISSION_SERVICE_HOST: {{ include "judge-engine.fullname" . }}-submission-service
  SUBMISSION_SERVICE_PORT: "8082"
  
  # Executor
  EXECUTOR_MODE: {{ .Values.worker.executorMode }}
  SANDBOX_MEMORY_LIMIT: {{ .Values.worker.resources.sandbox.memoryLimit }}
  SANDBOX_CPU_LIMIT: {{ .Values.worker.resources.sandbox.cpuLimit | quote }}
  SANDBOX_TIMEOUT: {{ .Values.worker.resources.sandbox.timeout | quote }}
  SANDBOX_PIDS_LIMIT: {{ .Values.worker.resources.sandbox.pidsLimit | quote }}
  MOCK_EXEC_TIMEOUT: {{ .Values.worker.resources.mock.execTimeout | quote }}
  MOCK_EXEC_MAX_MEMORY: {{ .Values.worker.resources.mock.maxMemory | quote }}
  
  # Runner image registry (in-cluster)
  RUNNER_REGISTRY: {{ include "judge-engine.fullname" . }}-registry:5000/
  
  # Logging
  LOG_LEVEL: {{ .Values.logLevel }}
  LOG_FORMAT: {{ .Values.logFormat }}
  
  # NGINX
  NGINX_PORT: "80"
  
  # Spring Profiles
  SPRING_PROFILES_ACTIVE: {{ .Values.springProfile }}