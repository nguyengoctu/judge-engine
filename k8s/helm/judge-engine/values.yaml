global:
  namespace: judge-engine

image:
  imagePullPolicy: Never

# imagePullSecrets for private registries (e.g. GHCR PAT stored as K8s secret)
# create with: kubectl create secret docker-registry ghcr-pull-secret \
#   --docker-server=ghcr.io --docker-username=<user> --docker-password=<PAT> -n judge-engine
imagePullSecrets: []
# - name: ghcr-pull-secret

ingress:
  enabled: true
  className: nginx
  annotations: {}
  # For AWS ALB:
  # className: alb
  # annotations:
  #   alb.ingress.kubernetes.io/scheme: internet-facing
  #   alb.ingress.kubernetes.io/target-type: ip
  #   alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'

monitoring:
  enabled: true

# profile
springProfile: dev

# log level
logLevel: DEBUG
logFormat: json

# services
version: latest

apiGateway:
  minReplicas: 1
  maxReplicas: 5
  desiredReplicas: 1
  image: api-gateway

frontend:
  minReplicas: 1
  maxReplicas: 5
  desiredReplicas: 1
  image: frontend

problemService:
  minReplicas: 1
  maxReplicas: 5
  desiredReplicas: 1
  image: problem-service

submissionService:
  minReplicas: 1
  maxReplicas: 5
  desiredReplicas: 1
  image: submission-service

worker:
  minReplicas: 2
  maxReplicas: 50
  desiredReplicas: 2
  image: worker
  dind:
    enabled: true
  executorMode: docker
  # Override runner image registry for EKS (GHCR or ECR).
  # Empty = use in-cluster registry (local/kind).
  # e.g. ghcr.io/nguyengoctu/judge-engine
  runnerRegistry: ""
  # Name of a K8s docker-registry secret used by DinD to pull runner images.
  # Only needed when runnerRegistry is a private registry.
  ghcrSecret: ""
  resources:
    containers:
      builder:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      worker:
        requests:
          cpu: "200m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      dind:
        requests:
          cpu: "300m"
          memory: "256Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
    sandbox:
      memoryLimit: "256m"
      cpuLimit: "0.5"
      timeout: "10"
      pidsLimit: "50"
    mock:
      execTimeout: "5"
      maxMemory: "256"

# in-cluster docker registry (for runner images)
# Disable when using GHCR or ECR as runner image source
registry:
  enabled: true
  storage: 2Gi

# third party

rabbitmq:
  replicaCount: 1
  image: rabbitmq:3-management-alpine
  user: guest
  password: guest
  storage: 1Gi

redis:
  replicaCount: 1
  image: redis:7-alpine
  storage: 1Gi

judgeDb:
  # Set enabled: false when using RDS (managed Postgres)
  enabled: true
  replicaCount: 1
  image: postgres:16-alpine
  user: postgres
  password: postgres
  storage: 1Gi
  # External host override (used in configMap when enabled: false)
  # e.g. mydb.xxxx.rds.amazonaws.com
  host: ""

# External Secrets Operator — EKS only.
# When enabled: credentials come from AWS Secrets Manager (no inline Secrets).
# When disabled: credentials come from values.yaml (local/kind).
externalSecrets:
  enabled: false
  # Secrets Manager secret name — set by infra.yml after terraform apply
  secretName: ""

# ServiceAccount with IRSA (AWS IAM Role for Service Account)
# Useful when pods need AWS service access (e.g. Secrets Manager, ECR)
serviceAccount:
  create: false
  # arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
  iamRoleArn: ""

# hpa / keda
autoScaling:
  worker:
    enabled: true
    useKeda: true                        # true = KEDA (queue-based), false = vanilla HPA (CPU-based)
    queueName: submissions.execute       # RabbitMQ queue to watch
    queueTarget: "5"                     # Scale up when > 5 messages per worker
    pollingInterval: 10                  # Check queue every 10s
    cooldownPeriod: 300                  # Wait 5min before scaling down
  submissionService:
    enabled: false